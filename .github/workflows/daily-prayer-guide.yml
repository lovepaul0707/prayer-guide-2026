name: Daily prayer guide

on:
  schedule:
    # 22:20 Asia/Taipei (UTC+8). GitHub Actions cron is evaluated in UTC.
    - cron: "20 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-prayer-guide
  cancel-in-progress: false

jobs:
  publish-tomorrow:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Taipei
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      PRAYER_WORKBOOK_B64: ${{ secrets.PRAYER_WORKBOOK_B64 }}
      LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      LINE_GROUP_ID: ${{ secrets.LINE_GROUP_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the generator requirements
        run: python -m pip install --disable-pip-version-check requests openpyxl

      - name: Restore the private workbook for this run
        shell: bash
        run: |
          set -euo pipefail
          test -n "$GEMINI_API_KEY"
          test -n "$PRAYER_WORKBOOK_B64"
          mkdir -p outputs
          printf '%s' "$PRAYER_WORKBOOK_B64" | base64 --decode > 'outputs/2026_21天禁禱禱告指引_繁體中文.xlsx'

      - name: Generate tomorrow's HTML and audio
        id: generate
        shell: bash
        run: |
          set -euo pipefail
          python work/auto_day_pipeline.py | tee generation.json
          if grep -q '"skipped": true' generation.json; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DAY="$(python - <<'PY'
          from datetime import date, timedelta
          print((date.today() + timedelta(days=1) - date(2026, 7, 13)).days + 1)
          PY
          )"
          printf 'day=%02d\n' "$DAY" >> "$GITHUB_OUTPUT"

      - name: Commit only the published files
        if: steps.generate.outputs.skipped != 'true'
        shell: bash
        run: |
          set -euo pipefail
          DAY="${{ steps.generate.outputs.day }}"
          mv site/index.html index.html
          mv "site/day-${DAY}.html" "day-${DAY}.html"
          mv "site/day-${DAY}.wav" "day-${DAY}.wav"
          git config user.name "prayer-guide automation"
          git config user.email "actions@github.com"
          git add -- index.html "day-${DAY}.html" "day-${DAY}.wav"
          git diff --cached --quiet && exit 0
          git commit -m "Update prayer guide day ${DAY#0}"
          git push origin HEAD:main

      - name: Verify public Pages files and hashes
        if: steps.generate.outputs.skipped != 'true'
        shell: bash
        run: |
          set -euo pipefail
          DAY="${{ steps.generate.outputs.day }}"
          BASE='https://lovepaul0707.github.io/prayer-guide-2026'
          for attempt in $(seq 1 60); do
            curl --fail --silent --show-error "$BASE/" -o public-index.html && \
            curl --fail --silent --show-error "$BASE/day-${DAY}.html" -o public-day.html && \
            curl --fail --silent --show-error "$BASE/day-${DAY}.wav" -o public-day.wav || { sleep 10; continue; }
            tr -d '\r' < "day-${DAY}.html" > local-day.html
            tr -d '\r' < public-day.html > normalized-public-day.html
            grep -q '<title>' public-day.html || { sleep 10; continue; }
            grep -q '<h1>' public-day.html || { sleep 10; continue; }
            test "$(sha256sum local-day.html | cut -d' ' -f1)" = "$(sha256sum normalized-public-day.html | cut -d' ' -f1)" || { sleep 10; continue; }
            test "$(sha256sum "day-${DAY}.wav" | cut -d' ' -f1)" = "$(sha256sum public-day.wav | cut -d' ' -f1)" || { sleep 10; continue; }
            exit 0
          done
          echo 'Public Pages verification did not pass within 10 minutes.' >&2
          exit 1

      - name: Notify LINE announcement group
        if: steps.generate.outputs.skipped != 'true'
        shell: bash
        run: |
          set -euo pipefail
          test -n "$LINE_CHANNEL_ACCESS_TOKEN"
          test -n "$LINE_GROUP_ID"
          python - "${{ steps.generate.outputs.day }}" <<'PY'
          from datetime import datetime, timedelta
          from html import unescape
          from pathlib import Path
          from zoneinfo import ZoneInfo
          import os
          import re
          import sys

          import requests

          day = sys.argv[1]
          page = Path(f"day-{day}.html").read_text(encoding="utf-8")
          match = re.search(r"<h1[^>]*>(.*?)</h1>", page, re.DOTALL | re.IGNORECASE)
          if not match:
              raise SystemExit("Could not read the day topic from the published HTML.")
          topic = re.sub(r"<[^>]+>", "", unescape(match.group(1))).strip()
          tomorrow = (datetime.now(ZoneInfo("Asia/Taipei")).date() + timedelta(days=1)).strftime("%Y/%m/%d")
          text = "\n".join((
              "2026 21天禁禱｜明日內容已完成",
              f"日期：{tomorrow}",
              f"進度：第 {int(day)} 天",
              f"主題：{topic}",
              "狀態：禱告指引、朗讀音檔及首頁均已重新製作並上架，公開網址驗證成功。",
              f"閱讀與聆聽：https://lovepaul0707.github.io/prayer-guide-2026/day-{day}.html",
              "全部內容：https://lovepaul0707.github.io/prayer-guide-2026/",
          ))
          response = requests.post(
              "https://api.line.me/v2/bot/message/push",
              headers={"Authorization": f"Bearer {os.environ['LINE_CHANNEL_ACCESS_TOKEN']}"},
              json={"to": os.environ["LINE_GROUP_ID"], "messages": [{"type": "text", "text": text}]},
              timeout=30,
          )
          response.raise_for_status()
          print("LINE API notification accepted.")
          PY
