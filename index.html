<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026 21天禁禱禱告指引</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f3ea;
      --paper: #fffdf8;
      --ink: #243044;
      --muted: #6c7280;
      --accent: #9b6a2f;
      --line: rgba(96, 67, 32, .18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 227, 171, .6), transparent 30rem),
        linear-gradient(180deg, #fbf5e8 0%, #f6f1e9 100%);
      color: var(--ink);
    }
    main {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 22px 16px 44px;
    }
    .hero {
      padding: 30px 22px;
      background: rgba(255, 253, 248, .94);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 18px 48px rgba(72, 47, 20, .13);
    }
    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-weight: 800;
      letter-spacing: .04em;
    }
    h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 48px);
      line-height: 1.15;
      letter-spacing: 0;
    }
    .intro {
      margin: 14px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.8;
    }
    .list {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    a.day {
      display: block;
      padding: 18px 18px;
      text-decoration: none;
      color: inherit;
      background: #fffaf0;
      border: 1px solid var(--line);
      border-radius: 18px;
    }
    .day-title {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: baseline;
      font-weight: 850;
      color: #1f2937;
    }
    .date {
      flex: 0 0 auto;
      color: var(--accent);
      font-size: 14px;
    }
    .desc {
      margin: 7px 0 0;
      color: var(--muted);
      line-height: 1.6;
    }
    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <p class="eyebrow">2026 Prayer Guide</p>
      <h1>21天禁禱禱告指引</h1>
      <p class="intro">手機閱讀版，含每日內容與朗讀音檔。目前已放上第 1 天。</p>
      <div class="list">
        <a class="day" href="day-01.html">
          <div class="day-title">
            <span>第 1 天｜禁食的角色</span>
            <span class="date">2026/7/13</span>
          </div>
          <p class="desc">點選進入閱讀內容，並播放朗讀音檔。</p>
        </a>
      </div>
    </section>
    <footer>適合 GitHub Pages、Netlify、Vercel 等靜態網站主機。</footer>
  </main>
</body>
</html>
